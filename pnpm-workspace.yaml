packages:
  - "packages/*"
  - "fixtures/*"
  - "examples/*"
  - "corpus/harness"
  - "corpus/hosts/*"
  - "apps/*"
  - "bench"
  - "spikes/*"
  # install-dx-creds is evidence-only and needs zod ^4 (Claude Agent SDK peer);
  # keeping it in the workspace flips zod peer resolution to 4.x for every
  # ai-SDK consumer (packages/agent, packages/ui, fixtures, ...). It installs
  # standalone with its own lockfile instead — see spikes/install-dx-creds/README.md.
  - "!spikes/install-dx-creds"

# pnpm 9 ran every dependency build script; pnpm 11 (strictDepBuilds) requires
# an explicit allowlist. These five are the deps with build scripts in the
# tree — all allowed, preserving pnpm 9 behavior.
allowBuilds:
  cbor-extract: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@anthropic-ai/claude-agent-sdk-darwin-arm64@0.3.214'
  - '@anthropic-ai/claude-agent-sdk-darwin-x64@0.3.214'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64-musl@0.3.214'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64@0.3.214'
  - '@anthropic-ai/claude-agent-sdk-linux-x64-musl@0.3.214'
  - '@anthropic-ai/claude-agent-sdk-linux-x64@0.3.214'
  - '@anthropic-ai/claude-agent-sdk-win32-arm64@0.3.214'
  - '@anthropic-ai/claude-agent-sdk-win32-x64@0.3.214'
  - '@anthropic-ai/claude-agent-sdk@0.3.214'

# pnpm 11 no longer reads the `pnpm` field in package.json; overrides live here.
overrides:
  "@types/react": "^19.2.0"
  # Security floors (2026-07-21 advisories): fast-uri GHSA-v2hh-gcrm-f6hx,
  # sharp/libvips GHSA-f88m-g3jw-g9cj — both reach us only via examples/demos.
  "fast-uri": ">=3.1.4"
  "sharp": ">=0.35.0"
  "@types/react-dom": "^19.2.0"
  "postcss@<8.5.10": ">=8.5.10"
