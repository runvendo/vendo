name: Release

on:
  # Real release: pushing a v* tag publishes the fixed lockstep group to npm.
  push:
    tags: ["v*"]
  # Dry run: manually dispatch to prove the publish end-to-end WITHOUT publishing
  # or tagging. Runs the exact gate stack + `pnpm -r publish --dry-run`.
  workflow_dispatch:

# id-token: write is required for npm provenance (Sigstore OIDC attestation).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      # Parity with the `ci` gate — a release must never publish something that
      # would have failed CI. typecheck + lint were previously missing here.
      - run: pnpm typecheck
      - run: pnpm lint

      # Dry run (workflow_dispatch): prove the publish resolves + packs without
      # touching the registry. --provenance is dropped here (no tag/release to
      # attest to, and dry runs mint no attestation).
      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm -r --filter './packages/*' publish --dry-run --no-git-checks --access public

      # Real publish (v* tag): pnpm -r skips any version already on the registry
      # (e.g. hand-versioned @vendoai/telemetry), so re-runs are safe.
      - name: Publish to npm
        if: github.event_name == 'push'
        run: pnpm -r --filter './packages/*' publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
