name: Release

on:
  # Real release: pushing a v* tag publishes the fixed lockstep group to npm.
  push:
    tags: ["v*"]
  # Dry run: manually dispatch to prove the publish end-to-end WITHOUT publishing
  # or tagging. Runs the exact gate stack + `pnpm -r publish --dry-run`.
  workflow_dispatch:

# id-token: write powers npm trusted publishing (OIDC) AND provenance: pnpm
# exchanges the workflow's OIDC token for a short-lived npm credential, so
# there is no NPM_TOKEN secret anywhere. Each package on npmjs.com lists this
# repo + this workflow file as its trusted publisher (see PUBLISH.md).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Same Postgres leg as the `ci` gate: @vendoai/store's postgres-gate test
    # requires POSTGRES_URL in CI so the PostgreSQL backend suite really runs.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vendo
          POSTGRES_PASSWORD: vendo
          POSTGRES_DB: vendo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vendo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      # No registry-url here on purpose: setup-node would write an
      # `_authToken=${NODE_AUTH_TOKEN}` line into .npmrc, and that placeholder
      # defeats OIDC trusted publishing (actions/setup-node#1551). pnpm
      # publishes to registry.npmjs.org by default and negotiates OIDC itself.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
        env:
          POSTGRES_URL: postgres://vendo:vendo@localhost:5432/vendo_test
      # Parity with the `ci` gate — a release must never publish something that
      # would have failed CI. typecheck + lint were previously missing here.
      - run: pnpm typecheck
      - run: pnpm lint

      # Dry run (workflow_dispatch): prove the publish resolves + packs without
      # touching the registry. --provenance is dropped here (no tag/release to
      # attest to, and dry runs mint no attestation).
      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm -r --filter './packages/*' publish --dry-run --no-git-checks --access public

      # Real publish (v* tag): pnpm -r skips any version already on the registry
      # (e.g. hand-versioned @vendoai/telemetry), so re-runs are safe.
      # Auth is OIDC trusted publishing — no token env by design.
      - name: Publish to npm
        if: github.event_name == 'push'
        run: pnpm -r --filter './packages/*' publish --no-git-checks --access public --provenance
