# Quarried during waves 3-6 of the v0 campaign: the corpus harness is out of the
# active workspace (red by design) until wave 7 rebuilds it against the new
# packages. The original sweep workflow lives in git history (last live version:
# `git show 3c9ff4c8:.github/workflows/corpus-nightly.yml`) and returns in wave 7.
name: Corpus Nightly

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quarried:
    runs-on: ubuntu-latest
    steps:
      - name: Quarried until wave 7
        run: |
          echo "The corpus harness is quarried during the v0 rebuild (waves 3-6)."
          echo "See legacy/README.md; the sweep returns against the new packages in wave 7."
          exit 1
