name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vendo
          POSTGRES_PASSWORD: vendo
          POSTGRES_DB: vendo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vendo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Runs every package's suite WITH v8 coverage and enforces each package's
      # ratcheted line-coverage floor (coverage.thresholds.lines in its vitest
      # config); a drop below the floor fails the build. This is the required
      # coverage gate — it supersedes a bare `pnpm test`.
      - name: Test with coverage (PGlite + PostgreSQL)
        run: pnpm test:coverage
        env:
          POSTGRES_URL: postgres://vendo:vendo@localhost:5432/vendo_test
      - run: pnpm typecheck
      - run: pnpm lint

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      # J9 (postgres-durability) runs the core journeys against real Postgres and
      # skips cleanly when POSTGRES_URL is unset; provisioning it here makes that
      # journey actually execute in CI.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vendo
          POSTGRES_PASSWORD: vendo
          POSTGRES_DB: vendo_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vendo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgres://vendo:vendo@localhost:5432/vendo_integration
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build only the workspace deps the two integration suites need (the `...`
      # suffix pulls each fixture package's transitive workspace deps).
      - run: pnpm turbo run build --filter=@vendoai-fixtures/integration... --filter=@vendoai-fixtures/integration-browser...
      # The node suite boots the real composed umbrella over HTTP against the host app.
      - run: pnpm --filter @vendoai-fixtures/integration test
      # The browser leg drives the shipped hooks/chrome in Chromium against the same wire.
      - run: pnpm --filter @vendoai-fixtures/integration-browser exec playwright install --with-deps chromium
      - run: pnpm --filter @vendoai-fixtures/integration-browser test:browser
      - if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: integration-browser-playwright-trace
          path: fixtures/integration-browser/e2e/test-results
          if-no-files-found: ignore
          retention-days: 7

  conformance:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vendo
          POSTGRES_PASSWORD: vendo
          POSTGRES_DB: vendo_conformance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vendo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URL: postgres://vendo:vendo@localhost:5432/vendo_conformance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm conformance
      # Vite's generated bundle differs byte-for-byte between macOS and Linux,
      # so freshness cannot be enforced with a cross-platform source diff. The
      # checked-in artifact is instead exercised through its real browser wire.
      - run: pnpm --filter @vendoai/ui exec playwright install --with-deps chromium
      - name: MCP Apps shim semantic contract
        run: pnpm --filter @vendoai/ui test:mcp-shim

  # Cadence's real Supabase Auth login (ENG-260): boots `supabase start`
  # (Docker) and drives the /login password grant end to end against the
  # seeded users. Only this job needs the Supabase stack — the suite probes
  # GoTrue and skips itself cleanly everywhere else (including the main ci
  # job's coverage run), so Supabase local never becomes a hard dependency
  # for unrelated tests.
  cadence-supabase-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          # Matches the version the config/seed were verified against.
          version: 2.90.0
      - run: pnpm install --frozen-lockfile
      # Build only the workspace deps the app boot needs; the suite runs the
      # app itself through `next dev`.
      - run: pnpm turbo run build --filter=demo-accounting^...
      - run: supabase start
        working-directory: apps/demo-accounting
      - run: pnpm --filter demo-accounting exec vitest run src/vendo/login-e2e.test.ts

  # Supply-chain gate: fails on high/critical advisories in the PRODUCTION
  # dependency graph (what ships in the published tarballs). Scoped to --prod so
  # dev-tooling advisories (vitest/vite/esbuild dev servers) — which never ship
  # to consumers and are tracked by Renovate instead — do not gate releases.
  # --audit-level=high keeps the known moderate postcss finding (via the private
  # host-app fixture's Next.js) from reddening the gate. See renovate.json.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # npm permanently retired the legacy audit endpoints on 2026-07-15 (HTTP
      # 410); `pnpm audit` only queries the replacement bulk-advisory endpoint
      # from pnpm 11 (pnpm/pnpm#11265). The repo pins pnpm 9 via packageManager
      # and pnpm 11 auto-delegates to that pin, so strip the field in this
      # throwaway checkout before auditing. 11.10.0 is the newest release that
      # clears the .npmrc minimumReleaseAge window. Remove this workaround when
      # the repo itself moves to pnpm 11 (tracked in Linear).
      - run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.packageManager;fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
          npx -y pnpm@11.10.0 audit --prod --audit-level high

  # Reminder that a user-facing change should ship a changeset. NON-BLOCKING by
  # design (the fleet auto-merges): this job is not a required check and its one
  # meaningful step degrades to a GitHub warning annotation instead of failing.
  changeset-status:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Changeset status (warn only)
        run: |
          git fetch --no-tags --depth=1 origin main || true
          pnpm changeset status --since=origin/main \
            || echo "::warning title=No changeset::This PR touches packages but has no changeset. If it should ship in a release, run \`pnpm changeset\`. (non-blocking)"
